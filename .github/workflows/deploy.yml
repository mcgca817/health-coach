name: Gated Deployment Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-test:
    name: Deploy & Test (TEST Server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo systemctl stop tailscaled || true
          sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 --state=mem: &
          sleep 10
          sudo tailscale up --auth-key=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-runner --accept-dns=false --reset

      - name: Set up Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.TEST_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Test
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault_pass.txt
          cd infra/ansible
          ansible-playbook -i inventory/hosts.ini playbooks/deploy.yml --limit test --vault-password-file ~/.vault_pass.txt
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          TEST_SERVER_IP: ${{ secrets.TEST_SERVER_IP }}
          ALL_PROXY: socks5://localhost:1055/

      - name: Run Tests on Test Server
        run: |
          ssh -o StrictHostKeyChecking=no cameron@${{ secrets.TEST_SERVER_IP }} "docker exec -t healthcoach-bot /app/entrypoint.sh test"
        env:
          ALL_PROXY: socks5://localhost:1055/

  deploy-prod:
    name: Deploy (PRODUCTION Server)
    needs: deploy-test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo systemctl stop tailscaled || true
          sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 --state=mem: &
          sleep 10
          sudo tailscale up --auth-key=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-runner --accept-dns=false --reset

      - name: Set up Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Prod
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault_pass.txt
          cd infra/ansible
          ansible-playbook -i inventory/hosts.ini playbooks/deploy.yml --limit prod --vault-password-file ~/.vault_pass.txt
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          PROD_SERVER_IP: ${{ secrets.PROD_SERVER_IP }}
          ALL_PROXY: socks5://localhost:1055/
