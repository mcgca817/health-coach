- name: Set timezone to Pacific/Auckland
  become: yes
  timezone:
    name: Pacific/Auckland

# Deploy the Health Coach application
- name: Copy application code
  synchronize:
    src: "{{ playbook_dir }}/../../../app/"
    dest: /opt/healthcoach/app/
    delete: yes
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=.pytest_cache"

- name: Copy config files
  synchronize:
    src: "{{ playbook_dir }}/../../../config/"
    dest: /opt/healthcoach/config/
    delete: no

- name: Copy SQL files
  synchronize:
    src: "{{ playbook_dir }}/../../../sql/"
    dest: /opt/healthcoach/sql/
    delete: no

- name: Copy test files
  synchronize:
    src: "{{ playbook_dir }}/../../../tests/"
    dest: /opt/healthcoach/tests/
    delete: yes

- name: Create env file from template
  become: yes
  template:
    src: "{{ playbook_dir }}/../templates/env.j2"
    dest: /opt/healthcoach/.env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Copy docker-compose.yml
  template:
    src: "{{ playbook_dir }}/../templates/docker-compose.yml.j2"
    dest: /opt/healthcoach/docker-compose.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Ensure Grafana directories exist
  become: yes
  file:
    path: "{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: '0755'
  loop:
    - /opt/healthcoach/grafana
    - /opt/healthcoach/grafana/data
    - /opt/healthcoach/grafana/provisioning
    - /opt/healthcoach/grafana/provisioning/datasources
    - /opt/healthcoach/grafana/provisioning/dashboards
    - /opt/healthcoach/grafana/provisioning/plugins
    - /opt/healthcoach/grafana/provisioning/notifiers
    - /opt/healthcoach/grafana/provisioning/alerting

- name: Deploy Grafana datasource provisioning
  become: yes
  template:
    src: "grafana/provisioning/datasources/postgres.yml.j2"
    dest: /opt/healthcoach/grafana/provisioning/datasources/postgres.yml
    owner: "472"
    group: "472"
    mode: '0644'

- name: Deploy Grafana dashboard provider config
  become: yes
  copy:
    src: "grafana/provisioning/dashboards/dashboards.yml"
    dest: /opt/healthcoach/grafana/provisioning/dashboards/dashboards.yml
    owner: "472"
    group: "472"
    mode: '0644'

- name: Deploy Health Coach dashboard JSON
  become: yes
  copy:
    src: "grafana/dashboards/health_coach.json"
    dest: /opt/healthcoach/grafana/provisioning/dashboards/health_coach.json
    owner: "472"
    group: "472"
    mode: '0644'

- name: Install Python dependencies
  pip:
    requirements: /opt/healthcoach/app/requirements.txt
    virtualenv: /opt/healthcoach/venv
    virtualenv_command: python3 -m venv

- name: Start Docker containers
  shell: |
    cd /opt/healthcoach
    docker compose up -d
  become: yes

- name: Wait for PostgreSQL to be ready
  wait_for:
    host: localhost
    port: 5432
    delay: 5
    timeout: 30

- name: Check if database is initialized
  shell: |
    docker exec healthcoach-postgres psql -U {{ postgres_user }} -d {{ postgres_db }} -c "SELECT 1 FROM daily_biometrics LIMIT 1;" || echo "not_initialized"
  register: db_check
  changed_when: false

- name: Initialize database schema
  shell: |
    cat /opt/healthcoach/sql/schema.sql | docker exec -i healthcoach-postgres psql -U {{ postgres_user }} -d {{ postgres_db }}
  when: "'not_initialized' in db_check.stdout"

- name: Copy systemd service files
  become: yes
  template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | basename | replace('.j2', '') }}"
    mode: '0644'
  loop:
    - healthcoach-bot.service.j2
    - health-sync.service.j2
    - health-sync.timer.j2
    - healthcoach-export.service.j2
    - healthcoach-export.timer.j2
  notify: Reload systemd

- name: Enable and start Telegram Bot
  become: yes
  systemd:
    name: healthcoach-bot
    state: started
    enabled: yes
    daemon_reload: yes

- name: Enable and start Health Sync Timer
  become: yes
  systemd:
    name: health-sync.timer
    state: started
    enabled: yes

- name: Enable and start Health Coach Export Timer
  become: yes
  systemd:
    name: healthcoach-export.timer
    state: started
    enabled: yes

- name: Ensure Google config directory exists
  ansible.builtin.file:
    path: "/opt/healthcoach/config/google"
    state: directory
    owner: cameron
    group: cameron
    mode: '0755'

- name: Deploy Google Service Account key
  ansible.builtin.copy:
    src: "service_account.json"
    dest: "/opt/healthcoach/config/google/service_account.json"
    owner: cameron
    group: cameron
    mode: '0600'  # Strict permissions: read/write only for the owner

- name: Ensure log directory exists
  file:
    path: /opt/healthcoach/logs
    state: directory
    mode: '0755'
    owner: cameron

- name: Install Java for Garmin FitCSVTool
  become: yes
  apt:
    name: openjdk-17-jre-headless
    state: present

- name: Create bin directory
  file:
    path: /opt/healthcoach/bin
    state: directory
    owner: cameron
    group: cameron
    mode: '0755'

- name: Download FitCSVTool.jar
  get_url:
    url: https://github.com/garmin/fit-sdk-tools/raw/main/FitCSVTool/FitCSVTool.jar
    dest: /opt/healthcoach/bin/FitCSVTool.jar
    mode: '0755'
    owner: cameron
    group: cameron

- name: Create export directory
  file:
    path: /opt/healthcoach/exports
    state: directory
    owner: cameron
    group: cameron
    mode: '0755'

- name: Install rclone and Java
  become: yes
  apt:
    name: 
      - rclone
      - openjdk-17-jre-headless
    state: present

- name: Create rclone config directory
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/rclone"
    state: directory
    mode: '0700'

- name: Configure rclone for Personal Google Drive
  template:
    src: rclone.conf.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/rclone/rclone.conf"
    mode: '0600'
