# Common setup tasks for all servers
- name: Update apt package cache
  become: yes
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install essential packages
  become: yes
  apt:
    name:
      - git
      - curl
      - wget
      - vim
      - htop
      - python3
      - python3-pip
      - python3-venv
      - build-essential
      - unattended-upgrades
      - rsync
      - libpq-dev  # <--- ADD THIS LINE (PostgreSQL development headers)
    state: present

- name: Enable automatic security updates
  become: yes
  command: dpkg-reconfigure -f noninteractive unattended-upgrades
  args:
    creates: /etc/apt/apt.conf.d/20auto-upgrades

- name: Add Trivy GPG key
  become: yes
  shell: |
    wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/trivy.gpg

- name: Add Trivy repository
  become: yes
  copy:
    dest: /etc/apt/sources.list.d/trivy.list
    content: "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb noble main"
    mode: '0644'

- name: Install Trivy
  become: yes
  apt:
    name: trivy
    state: present
    update_cache: yes

- name: Create application directory
  become: yes
  file:
    path: /opt/healthcoach
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Create logs directory
  become: yes
  file:
    path: /opt/healthcoach/logs
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Create backups directory
  become: yes
  file:
    path: /opt/healthcoach/backups
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
